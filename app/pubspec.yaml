name: timefocus
description: "TimeFocus"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  config:
    enable-swift-package-manager: true

  assets:
    - assets/icons/

flutter_gen:
  line_length: 100
